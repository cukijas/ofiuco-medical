version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ofiuco-medical-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ofiuco_medical}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ofiuco_medical}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ofiuco-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ofiuco-medical-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ofiuco_medical}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./os_modelo:/app/os_modelo:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ofiuco-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ofiuco-medical-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - ofiuco-net
    restart: unless-stopped

volumes:
  pg_data:

networks:
  ofiuco-net:
    driver: bridge
